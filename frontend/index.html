<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資集團指揮中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
        }
        .markdown-body th {
            background-color: #f9fafb;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">AI 投資集團 📊</h1>
            <p class="text-gray-600">全方位多模型股市分析系統</p>
        </header>

        <!-- Search Box -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">輸入股票代號 (Ticker)</h2>
            <div class="flex gap-4">
                <input type="text" id="tickerInput" placeholder="例如: SNDK, NVDA, AAPL" 
                       class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                
                <select id="personaSelect" class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="financial_structure">財務結構分析 (原大叔防禦)</option>
                    <option value="supply_chain_structure">供應鏈結構分析 (原辺邏輯)</option>
                    <option value="benjamin_graham">Benjamin Graham (價值防禦)</option>
                    <option value="peter_lynch">Peter Lynch (合理成長)</option>
                    <option value="cathie_wood">Cathie Wood (破壞性創新)</option>
                    <option value="piotroski_fscore">Piotroski (F-Score 量化)</option>
                    <option value="all">【Pro】6 模型交叉對比 (對比表)</option>
                </select>

                <button onclick="analyzeStock()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors">
                    開始解析
                </button>
            </div>
            <div id="errorMsg" class="hidden text-red-500 mt-3 text-sm">請輸入股票代號</div>
        </div>

        <!-- Loading State -->
        <div id="loadingArea" class="hidden flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-600 text-lg font-medium">量化模型正在調閱資料並進行解構中...</p>
            <p class="text-gray-400 text-sm mt-2">(同步爬取基本面、報表風險與市場情緒)</p>
        </div>

        <!-- Result Area -->
        <div id="resultArea" class="hidden bg-white rounded-xl shadow-lg p-8">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-gray-800" id="resultTitle">報告產出</h3>
                <span id="resultPersona" class="bg-indigo-100 text-indigo-800 text-sm font-semibold px-3 py-1 rounded-full">模型</span>
            </div>
            
            <div id="reportContent" class="prose max-w-none text-gray-700 whitespace-pre-wrap leading-relaxed markdown-body">
                <!-- Report content goes here -->
            </div>
        </div>

        <!-- Paywall/Upsell Banner (for free users) -->
        <div id="paywallBanner" class="hidden mt-8 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-xl shadow-lg p-6 text-white text-center">
            <h3 class="text-xl font-bold mb-2">想解鎖全視角分析嗎？</h3>
            <p class="mb-4">升級至 Pro 方案，一鍵並行六大模型解析，並獲得 SEC 原始財報深度洞察。</p>
            <button class="bg-white text-indigo-600 hover:bg-gray-100 font-bold py-2 px-6 rounded-full transition-colors">
                解鎖 Pro 權限 ($19/月)
            </button>
        </div>
    </div>

    <script>
        async function analyzeStock() {
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            const personaSelect = document.getElementById('personaSelect');
            const personaName = personaSelect.options[personaSelect.selectedIndex].text.split(' ')[0];
            const personaId = personaSelect.value;

            if (!ticker) {
                document.getElementById('errorMsg').classList.remove('hidden');
                return;
            }
            document.getElementById('errorMsg').classList.add('hidden');

            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('paywallBanner').classList.add('hidden');
            document.getElementById('loadingArea').classList.remove('hidden');
            document.getElementById('loadingArea').classList.add('flex');
            
            setTimeout(() => {
                document.getElementById('loadingArea').classList.add('hidden');
                document.getElementById('loadingArea').classList.remove('flex');
                
                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('paywallBanner').classList.remove('hidden');
                
                document.getElementById('resultTitle').innerText = `${ticker} - 深度解析報告`;
                document.getElementById('resultPersona').innerText = personaName + (personaId === 'all' ? " 交叉對比" : " 模型");
                
                let mockMarkdown = `**【資料採集完畢】**\n已同步抓取 Yahoo Finance 最新股價、SEC 財報與過去 48 小時關聯新聞。\n\n`;
                
                if (personaId === 'all') {
                    mockMarkdown += `### 📊 6 模型交叉對比表\n\n| 分析模型 | 核心指標檢核 | 紅燈警告 (Red Flags) | 估值 / 評級 |\n| :--- | :--- | :--- | :--- |\n| **財務結構分析** | FCF 為負，SBC 佔比 8% | 股本稀釋過快 | 觀望 (Wait) |\n| **供應鏈結構分析** | 內供率 15%，CapEx 激增 | 一線廠產能已滿 | 加碼 (Overweight) |\n| **Benjamin Graham** | P/B > 1.5，P/E > 15 | 無安全邊際 | 賣出 (Sell) |\n| **Peter Lynch** | PEG = 1.2，營收大於存貨 | 估值略高 | 持有 (Hold) |\n| **Cathie Wood** | 營收 CAGR > 20%，TAM 擴張 | 研發費用高昂 | 強烈買進 (Strong Buy) |\n| **Piotroski F-Score** | 5 / 9 (中性偏弱) | ROA 改善有限 | 觀望 (Wait) |\n\n> *請將後端伺服器 (n8n/Docker/GitHub Actions) 的 Webhook URL 填入 frontend/index.html 的 fetch 區塊即可完成串接，獲取真實 API 數據！*`;
                } else {
                    mockMarkdown += `**【${personaName} 模型的分析】**\n\n這是一份由後端 API (main_agent.py) 生成的報告內容佔位符。\n當前後端連線建立後，這裡將會顯示 ${personaName} 模型的標準化解析：\n\n* 核心量化指標對齊與驗證\n* 模型專屬風險警告\n* 客觀投資決策建議\n\n> *請將後端伺服器 (n8n/Docker/GitHub Actions) 的 Webhook URL 填入 frontend/index.html 的 fetch 區塊即可完成串接，獲取真實 API 數據！*`;
                }
                
                document.getElementById('reportContent').innerHTML = marked.parse(mockMarkdown);
            }, 3000);
        }
    </script>
</body>
</html>
