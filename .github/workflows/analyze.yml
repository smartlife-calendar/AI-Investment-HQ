name: 大師解析 - Stock Analysis

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "股票代號 (例如: SNDK, RDW, LITE)"
        required: true
        default: "SNDK"
      persona:
        description: "分析師 (dashu_veteran / bian_supplychain / all)"
        required: true
        default: "all"
      financial_text:
        description: "[選填] 貼上財報文字，空白則自動抓取"
        required: false
        default: ""

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run full pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TICKER: ${{ github.event.inputs.ticker }}
          PERSONA: ${{ github.event.inputs.persona }}
          FINANCIAL_TEXT: ${{ github.event.inputs.financial_text }}
        run: python agents/full_pipeline.py
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.inputs.ticker }}-${{ github.run_number }}
          path: reports/
          retention-days: 30
