name: 大師解析 - Stock Analysis

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "股票代號 (例如: RDW, SMR, LITE)"
        required: true
        default: "RDW"
      persona:
        description: "分析師 (dashu_veteran / bian_supplychain / all)"
        required: true
        default: "all"
      financial_text:
        description: "貼上財報或分析文字"
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TICKER: ${{ github.event.inputs.ticker }}
          PERSONA: ${{ github.event.inputs.persona }}
          FINANCIAL_TEXT: ${{ github.event.inputs.financial_text }}
        run: python agents/run_analysis.py
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report-${{ github.event.inputs.ticker }}
          path: reports/
          retention-days: 30
