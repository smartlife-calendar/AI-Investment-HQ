version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: ai_hq_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Taipei
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped
